name: CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.8", "3.9"]
      fail-fast: false

    steps:
      - name: Check out the repository
        uses: actions/checkout@v3

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Docker Compose
        run: |
          sudo apt-get update
          sudo apt-get install docker-compose -y

      - name: Start LocalStack with Docker Compose
        run: docker-compose up -d

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pylint
        run: |
          pylint --fail-under 7 app
          exitcode="$?"
          echo "exitcode=$exitcode" >> $GITHUB_OUTPUT
          exit "$exitcode"

      - name: Run unit tests
        run: |
          pytest tests/unit --maxfail=1 --disable-warnings -v
          coverage run -m pytest tests/unit && coverage report -m

      - name: Run integration tests
        run: |
          pytest tests/integration --maxfail=1 --disable-warnings -v
          coverage run -m pytest tests/integration && coverage report -m

      - name: Run BDD tests
        run: |
          behave features/ --no-capture --format progress2

      - name: Teardown Docker
        if: always()
        run: docker-compose down
